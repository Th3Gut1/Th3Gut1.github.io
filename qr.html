<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Datos Bancarios</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#f3f4f6,#dfe9f3);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#fff;
    width:380px;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    color:#0055A4;
    margin-bottom:20px;
}

.datos{
    text-align:left;
    background:#f8f9fa;
    padding:18px;
    border-radius:12px;
    margin-bottom:25px;
    line-height:1.8;
    font-size:16px;
}

.datos strong{
    color:#0055A4;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0055A4;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#003d75;
    transform:translateY(-2px);
}

button:active{
    transform:scale(.98);
}

#mensaje{
    margin-top:18px;
    color:#28a745;
    font-weight:bold;
    display:none;
}

.footer{
    margin-top:25px;
    font-size:13px;
    color:#777;
}
.logo{
    width:320px;
    height:auto;
    margin-bottom:20px;
}
</style>

</head>

<body>

<div class="card">

<img src="WhatsApp Image 2026-07-03 at 11.18.25.jpeg" alt="Logo" class="logo" m>
<h2> 🏦 Datos Bancarios</h2>

<div class="datos">

Inversiones Gaymer y Senkyr SpA<br>
77.309.259-1<br>
Banco Santander<br>
Cuenta Corriente<br>
0008206498-2
</div>

<button onclick="copiar()">
📋 Copiar Datos Bancarios
</button>

<div id="mensaje">
✅ Datos copiados correctamente.
</div>

<div class="footer">
Escanea este código para copiar rápidamente los datos de transferencia.
</div>

</div>

<script>

function copiar(){

const texto=`Inversiones Gaymer y Senkyr SpA
RUT: 77.309.259-1
Banco: Santander
Cuenta Corriente
0008206498-2`;

navigator.clipboard.writeText(texto);

const mensaje=document.getElementById("mensaje");

mensaje.style.display="block";

setTimeout(()=>{
mensaje.style.display="none";
},2500);

}

</script>

</body>
</html>
